# Experimento de clasificación de enfermedades en plantas con MobileNetV2

# Clases (nombre = especie___estado)
clases:
  - Tomato___Early_blight
  - Tomato___Late_blight
  - Tomato___healthy

# Dataset de MongoDB
dataset: real
imagenes_por_clase: 100

# Formato opcional del nombre
formato: "{especie}_{estado}_{indice}.jpg"

# Split de datos
split:
  train: 0.7
  val: 0.2
  test: 0.1

# Modelo
pretrained: true
fine_tune: top

# Entrenamiento
image_size: [224, 224]
batch_size: 32
epochs: 10
lr: 0.0001
