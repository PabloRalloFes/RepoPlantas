# Experimento de clasificación de enfermedades en plantas con MobileNetV2

# Clases (nombre = especie___estado)
cultivos:
  - Apple
  - Blueberry
  - Cherry_(including_sour)
  - Corn_(maize)
  - Grape
  - Orange
  - Peach
  - Pepper_bell
  - Potato
  - Raspberry
  - Soybean
  - Squash
  - Strawberry
  - Tomato

enfermedades:
  - Apple_scab
  - Bacterial_spot
  - Black_rot
  - Cedar_apple_rust
  - Cercospora_leaf_spot_Gray_leaf_spot
  - Common_rust_
  - Early_blight
  - Esca_(Black_Measles)
  - Haunglongbing_(Citrus_greening)
  - healthy
  - Late_blight
  - Leaf_Mold
  - Leaf_blight_(Isariopsis_Leaf_Spot)
  - Leaf_scorch
  - Northern_Leaf_Blight
  - Powdery_mildew
  - Septoria_leaf_spot
  - Spider_mites_Two-spotted_spider_mite
  - Target_Spot
  - Tomato_Yellow_Leaf_Curl_Virus
  - Tomato_mosaic_virus



# Lista de fuentes 
fuentes:
  - PlantVillage
imagenes_por_clase: 20

# Formato
formato: Color

# Split de datos
split:
  train: 0.7
  val: 0.2
  test: 0.1

# Modelo
weights: MobileNet_V2_Weights.DEFAULT
fine_tune: top

# Entrenamiento
image_size: [224, 224]
batch_size: 32
epochs: 3
lr: 0.001
